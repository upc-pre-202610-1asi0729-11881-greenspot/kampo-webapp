<div class="employee-view">
  <app-employee-list></app-employee-list>

  @if (store.selectedEmployee()) {
    <app-employee-detail [employee]="store.selectedEmployee()!"></app-employee-detail>
  }

  @if (showForm) {
    <app-employee-form
      [employee]="store.selectedEmployee()"
      (formSubmit)="onFormSubmit($event)">
    </app-employee-form>
  }
</div>
