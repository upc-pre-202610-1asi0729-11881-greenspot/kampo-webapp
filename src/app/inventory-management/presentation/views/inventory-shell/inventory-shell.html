<div class="shell">
  <mat-toolbar class="professional-header">
    <mat-icon class="toolbar-icon">warehouse</mat-icon>
    <div class="toolbar-text">
      <span class="toolbar-title">Inventario</span>
      <span class="toolbar-sub">Ítems, proveedores y pedidos de insumos</span>
    </div>
    <span class="spacer"></span>
    @if (store.isLoading()) {
      <mat-progress-spinner mode="indeterminate" diameter="32" color="accent"></mat-progress-spinner>
    }
  </mat-toolbar>

  <nav class="subnav">
    <div class="subnav-container">
      @for (link of navLinks; track link.path) {
        <a
          mat-stroked-button
          class="mock-btn"
          [routerLink]="link.path"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="link.path === 'inventario' ? { exact: true } : { exact: false }"
        >
          <mat-icon>{{ link.icon }}</mat-icon>
          {{ link.label }}
        </a>
      }
    </div>
  </nav>

  <div class="content-wrapper">
    <div class="outlet-wrap">
      <router-outlet />
    </div>
  </div>
</div>
