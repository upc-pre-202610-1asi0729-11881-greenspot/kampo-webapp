<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Nuevo proveedor</mat-card-title>
      <mat-card-subtitle>Datos de contacto para pedidos de insumos.</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" class="grid" (ngSubmit)="onAddSupplier()">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Contacto</mat-label>
          <input matInput formControlName="contact" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Correo</mat-label>
          <input matInput type="email" formControlName="email" />
          @if (form.controls.email.invalid && form.controls.email.touched) {
            <mat-error>Correo no válido</mat-error>
          }
        </mat-form-field>
        <div class="actions full">
          <button mat-button type="button" (click)="cancel()">Cancelar</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            <mat-icon>save</mat-icon>
            Guardar
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
