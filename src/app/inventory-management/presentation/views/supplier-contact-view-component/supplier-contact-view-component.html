<div class="container">
  @if (supplier(); as s) {
    <mat-card>
      <mat-card-header>
        <div mat-card-avatar class="avatar">
          <mat-icon>local_shipping</mat-icon>
        </div>
        <mat-card-title>{{ s.getName() }}</mat-card-title>
        <mat-card-subtitle>Contacto del proveedor</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p class="contact-line">{{ showContact() }}</p>
        <p><strong>Teléfono / contacto:</strong> {{ s.getContact() }}</p>
        <p><strong>Correo:</strong> {{ s.getEmail() }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button type="button" (click)="router.navigate(['/inventory-management/pedidos'])">
          Volver
        </button>
      </mat-card-actions>
    </mat-card>
  } @else {
    <mat-card>
      <mat-card-content>
        <p>No se encontró el proveedor. Carga la lista desde el módulo o revisa el ID en la URL.</p>
        <button mat-stroked-button type="button" (click)="router.navigate(['/inventory-management/proveedores/nuevo'])">
          Registrar proveedor
        </button>
      </mat-card-content>
    </mat-card>
  }
</div>
