<div class="container">
  <div class="header">
    <h2>{{ isEdit ? 'Editar Organización' : 'Nueva Organización' }}</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Nombre de la Organización</mat-label>
        <input matInput formControlName="name" placeholder="Ej. Finca La Esperanza">
        <mat-error *ngIf="form.get('name')?.hasError('required')">El nombre es obligatorio</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>RUC</mat-label>
        <input matInput formControlName="ruc" placeholder="11 dígitos">
        <mat-error *ngIf="form.get('ruc')?.invalid">RUC inválido (debe tener 11 dígitos)</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Dirección</mat-label>
        <input matInput formControlName="address">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Teléfono</mat-label>
        <input matInput formControlName="phone" type="tel">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Correo Electrónico</mat-label>
        <input matInput formControlName="email" type="email" placeholder="ejemplo@kampo.com">
        <mat-error *ngIf="form.get('email')?.hasError('email')">Formato de correo inválido</mat-error>
      </mat-form-field>
    </div>

    <div class="actions">
      <button mat-button type="button" (click)="cancel()">
        Cancelar
      </button>
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        <mat-icon>save</mat-icon>
        {{ isEdit ? 'Actualizar' : 'Guardar' }}
      </button>
    </div>
  </form>
</div>
