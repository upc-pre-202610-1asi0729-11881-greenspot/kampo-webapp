<mat-card>
  <mat-card-header>
    <mat-card-title>🌱 {{ 'common.add' | translate }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <mat-form-field appearance="outline">
      <mat-label>{{ 'employee.dni' | translate }}</mat-label>
      <label>
        <input matInput [(ngModel)]="firstName" name="firstName" />
      </label>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ 'common.name' | translate }}</mat-label>
      <label>
        <input matInput [(ngModel)]="lastName" name="lastName" />
      </label>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ 'organization.email' | translate }}</mat-label>
      <label>
        <input matInput [(ngModel)]="email" name="email" type="email" />
      </label>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ 'organization.phone' | translate }}</mat-label>
      <label>
        <input matInput [(ngModel)]="phone" name="phone" />
      </label>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ 'common.password' | translate }}</mat-label>
      <label>
        <input matInput [(ngModel)]="password" name="password" type="password" />
      </label>
    </mat-form-field>
  </mat-card-content>

  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="onRegisterUser()">
      {{ 'common.save' | translate }}
    </button>
  </mat-card-actions>
</mat-card>
