<div class="kampo-table-container">
  @if (isLoading) {
    <div class="loading-state">
      <mat-spinner diameter="32"></mat-spinner>
      <p>Loading reports...</p>
    </div>
  } @else if (reports.length === 0) {
    <div class="empty-state">
      <mat-icon class="empty-icon">feed</mat-icon>
      <p>No reports generated yet.</p>
    </div>
  } @else {
    <table mat-table [dataSource]="reports" class="kampo-minimal-table">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>REPORT ID</th>
        <td mat-cell *matCellDef="let row" class="bold-text">#{{ row.getId() }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>CATEGORY</th>
        <td mat-cell *matCellDef="let row">
          <span class="kampo-tag" [class]="row.getType().toLowerCase() === 'financial' ? 'financiero' : row.getType().toLowerCase()">
            {{ row.getType() }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="season">
        <th mat-header-cell *matHeaderCellDef>SEASON / PERIOD</th>
        <td mat-cell *matCellDef="let row" class="sub-text">Season {{ row.getSeasonsId() }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-right">ACTIONS</th>
        <td mat-cell *matCellDef="let row" class="text-right">
          <button mat-icon-button color="primary" class="action-btn" (click)="onSelect(row.getId()); $event.stopPropagation()">
            <mat-icon>arrow_forward_ios</mat-icon>
          </button>
          <button mat-icon-button color="warn" class="action-btn" (click)="onDelete(row.getId()); $event.stopPropagation()">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" class="hover-row" (click)="onSelect(row.getId())"></tr>
    </table>
  }
</div>
