<mat-card>
  <mat-card-header>
    <mat-card-title>
      <mat-icon>description</mat-icon>
      Reports
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    @if (isLoading) {
      <div class="spinner-container">
        <mat-spinner diameter="40" />
      </div>
    } @else if (reports.length === 0) {
      <div class="empty-state">
        <mat-icon>inbox</mat-icon>
        <p>No reports found.</p>
      </div>
    } @else {
      <table mat-table [dataSource]="reports" class="w-full">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let row">{{ row.getId() }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef>Type</th>
          <td mat-cell *matCellDef="let row">
            <mat-chip [class]="'chip-' + row.getType().toLowerCase()">
              {{ row.getType() }}
            </mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="season">
          <th mat-header-cell *matHeaderCellDef>Season</th>
          <td mat-cell *matCellDef="let row">{{ row.getSeasonsId() }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button
              mat-icon-button
              color="primary"
              matTooltip="View report"
              (click)="onSelect(row.getId()); $event.stopPropagation()"
            >
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          class="clickable-row"
          (click)="onSelect(row.getId())"
        ></tr>
      </table>
    }
  </mat-card-content>
</mat-card>
