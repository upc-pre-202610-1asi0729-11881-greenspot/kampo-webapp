@if (isLoading) {
  <div style="display: flex; justify-content: center; padding: 20px;">
    <mat-spinner></mat-spinner>
  </div>
} @else {
  <table mat-table [dataSource]="alerts">

    <ng-container matColumnDef="message">
      <th mat-header-cell *matHeaderCellDef>Message</th>
      <td mat-cell *matCellDef="let alert">{{ alert.message }}</td>
    </ng-container>

    <ng-container matColumnDef="priority">
      <th mat-header-cell *matHeaderCellDef>Priority</th>
      <td mat-cell *matCellDef="let alert">
        <mat-chip>{{ alert.priority }}</mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let alert">
        {{ alert.isRead ? 'Read' : 'Unread' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let alert">
        <button mat-button color="primary" (click)="onSelect(alert.id)">
          View
        </button>
        @if (!alert.isRead) {
          <button mat-button color="accent" (click)="onMarkRead(alert.id)">
            Mark Read
          </button>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
}
